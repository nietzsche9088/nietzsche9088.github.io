bio: >
  Qiuyu Tang is a PhD student in Computer Science and Engineering at Lehigh University,
  advised by Aparna Bharati. Her research focuses on trustworthy visual computing,
  spanning media forensics, origin protection, generative image editing, and adversarial robustness.
  She works on methods that make image generation and editing more secure, interpretable, and reliable.
research_interests:
  - Media forensics and authenticity
  - Generative models and image editing
  - Adversarial robustness and origin protection
  - Computer vision for trustworthy AI
