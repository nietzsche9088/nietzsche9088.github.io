{{ define "main" }}
  <section class="page-section page-shell">
    <div class="section-heading">
      <p class="section-kicker">Updates</p>
      <h1>{{ .Title }}</h1>
      {{ with .Description }}<p class="section-lead">{{ . }}</p>{{ end }}
    </div>
    <div class="timeline">
      {{ range sort site.Data.news "date" "desc" }}
        <article class="card timeline-item">
          <p class="eyebrow">{{ time.Format "Jan 2, 2006" .date }}</p>
          <h2>{{ .title }}</h2>
          <p>{{ .summary }}</p>
          {{ with .external_url }}<a class="text-link" href="{{ . }}" target="_blank" rel="noopener">Learn more</a>{{ end }}
        </article>
      {{ end }}
    </div>
  </section>
{{ end }}
